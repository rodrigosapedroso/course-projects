<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RPG Creature Search App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>RPG Creature Search App</h1>
    <label for="search-input">Search for Creature Name or ID: </label>
    <input id="search-input" type="text" required />
    <button id="search-button">Search</button>
    <div>
      <span id="creature-name"></span>
      <span id="creature-id"></span>
    </div>
    <div>
      <span id="weight"></span>
      <span id="height"></span>
    </div>
    <div id="types"></div>
    <div id="description"></div>
    <span>Base</span>
    <span>Stats</span>
    <div>
      <span>HP: </span>
      <span id="hp"></span>
    </div>
    <div>
      <span>Attack: </span>
      <span id="attack"></span>
    </div>
    <div>
      <span>Defense: </span>
      <span id="defense"></span>
    </div>
    <div>
      <span>Sp. Attack: </span>
      <span id="special-attack"></span>
    </div>
    <div>
      <span>Sp. Defense: </span>
      <span id="special-defense"></span>
    </div>
    <div>
      <span>Speed: </span>
      <span id="speed"></span>
    </div>
    <script src="script.js"></script>
  </body>
</html>
